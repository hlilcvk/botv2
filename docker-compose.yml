version: '3.8'

services:
  engine:
    build: .
    ports:
      - "3200:3200"
    environment:
      - PORT=3200
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

volumes:
  redis_data:
