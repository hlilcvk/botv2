<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>PROPTREX | Signal Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@keyframes bl  { 0%,100%{opacity:1} 50%{opacity:.25} }
@keyframes sc  { 0%{left:-20%} 100%{left:100%} }
@keyframes fi  { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }
@keyframes hl  { 0%{box-shadow:0 0 0 3px rgba(240,185,11,.35)} 100%{box-shadow:none} }
@keyframes slideIn { from{transform:translateX(120%);opacity:0} to{transform:translateX(0);opacity:1} }

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafafa; --card:#fff; --surface:#f5f5f5; --hover:#f8f8f8;
  --border:#eaecef; --border2:#d5d8dc;
  --t1:#1e2329; --t2:#474d57; --t3:#848e9c; --t4:#b7bdc6;
  --yellow:#f0b90b; --ybg:rgba(240,185,11,.08); --ydark:#c99400;
  --green:#0ecb81;  --gbg:rgba(14,203,129,.08);
  --red:#f6465d;    --rbg:rgba(246,70,93,.06);
  --blue:#1890ff;   --whale:#7c3aed;
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;
  min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Scan line ── */
.scan{height:2px;background:var(--surface);position:relative;overflow:hidden;flex-shrink:0}
.scan::after{content:'';position:absolute;top:0;left:0;height:100%;width:20%;
  background:linear-gradient(90deg,transparent,var(--yellow),transparent);
  animation:sc .8s linear infinite}

/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;
  background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;gap:16px;
  position:sticky;top:0;z-index:100}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo{width:38px;height:38px;background:var(--yellow);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:.85rem;color:#1e2329;flex-shrink:0}
.logo-t .b{font-weight:800;font-size:1.05rem;color:var(--t1);letter-spacing:1px;line-height:1}
.logo-t .s{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--t3);
  letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.live-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;
  background:var(--gbg);border:1px solid rgba(14,203,129,.2);border-radius:12px;
  font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--green);font-weight:600}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:bl 1.5s ease infinite}
.live-dot.off{background:var(--t4);animation:none}

.hdr-stats{display:flex;gap:24px}
.hs{display:flex;flex-direction:column;align-items:center}
.hs-l{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--t4);
  text-transform:uppercase;letter-spacing:1.5px;font-weight:500}
.hs-v{font-family:'IBM Plex Mono',monospace;font-size:.88rem;font-weight:700;font-variant-numeric:tabular-nums}

.hdr-r a{padding:7px 16px;border-radius:6px;border:1px solid var(--border);
  font-size:.82rem;font-weight:600;color:var(--t2);cursor:pointer;
  text-decoration:none;transition:all .15s}
.hdr-r a:hover{background:var(--hover);border-color:var(--border2)}

/* ── Filter bar ── */
.fbar{display:flex;align-items:center;gap:8px;padding:10px 20px;
  background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.fb-label{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--t4);
  text-transform:uppercase;letter-spacing:1.5px;margin-right:4px;font-weight:600}
.ftag{padding:5px 13px;font-family:'IBM Plex Mono',monospace;font-size:.7rem;font-weight:600;
  color:var(--t3);cursor:pointer;border:1px solid var(--border);background:none;
  border-radius:4px;transition:all .1s}
.ftag:hover{border-color:var(--border2);color:var(--t1)}
.ftag.on{border-color:var(--yellow);color:var(--ydark);background:var(--ybg)}
.f-sep{width:1px;height:18px;background:var(--border);margin:0 6px}
.f-search{margin-left:auto;padding:6px 12px;background:var(--surface);border:1px solid var(--border);
  color:var(--t1);font-family:'Inter',sans-serif;font-size:.82rem;border-radius:5px;width:180px}
.f-search:focus{outline:none;border-color:var(--yellow)}
.f-search::placeholder{color:var(--t4)}

/* ── Momentum strip ── */
.mstrip{display:flex;gap:8px;flex-wrap:wrap;padding:10px 20px;
  background:#fffdf0;border-bottom:1px solid #f0e5a0;}
.mpill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;
  background:#fff;border:1px solid rgba(124,58,237,.2);border-radius:20px;font-size:.72rem}
.mpill .ms{font-weight:700;color:var(--whale)}
.mpill .mc{font-weight:700}
.mpill .mv{color:var(--t4);font-family:'IBM Plex Mono',monospace;font-size:.65rem}

/* ── Card grid ── */
.main{padding:20px;max-width:1400px;margin:0 auto}

.grid-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.grid-title{font-weight:800;font-size:1rem;color:var(--t1)}
.grid-count{font-family:'IBM Plex Mono',monospace;font-size:.75rem;color:var(--t3);
  background:var(--surface);padding:3px 10px;border-radius:10px;border:1px solid var(--border)}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}

/* ── Signal Card ── */
.sig-card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:18px;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .15s;
  position:relative;overflow:hidden;animation:fi .25s ease}
.sig-card.new-card{animation:fi .25s ease,hl .8s ease}

.sig-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sig-card.long::before{background:var(--green)}
.sig-card.short::before{background:var(--red)}

.sig-card:hover{border-color:var(--border2);box-shadow:0 4px 16px rgba(0,0,0,.07);transform:translateY(-1px)}
.sig-card.long:hover{border-color:rgba(14,203,129,.35)}
.sig-card.short:hover{border-color:rgba(246,70,93,.35)}

/* Card top */
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-sym{display:flex;align-items:center;gap:9px}
.sym-icon{width:32px;height:32px;border-radius:50%;background:var(--ybg);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:.65rem;color:var(--ydark);flex-shrink:0}
.sym-name{font-weight:700;font-size:.95rem;color:var(--t1)}
.sym-sub{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--t3);margin-top:1px}
.card-badges{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end}

.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:8px;
  font-size:.68rem;font-weight:700;letter-spacing:.4px}
.badge.long  {background:var(--gbg);color:var(--green);border:1px solid rgba(14,203,129,.2)}
.badge.short {background:var(--rbg);color:var(--red);  border:1px solid rgba(246,70,93,.2)}
.badge.score {background:var(--ybg);color:var(--ydark);border:1px solid rgba(240,185,11,.2)}
.badge.exch  {background:var(--surface);color:var(--t3);border:1px solid var(--border)}
.badge.tf    {background:rgba(24,144,255,.07);color:var(--blue);border:1px solid rgba(24,144,255,.15)}

/* Score bar */
.score-bar{display:flex;align-items:center;gap:7px;margin-bottom:12px}
.score-num{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:.92rem;min-width:32px}
.score-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.score-fill{height:100%;border-radius:2px;transition:width .3s}

/* Card data rows */
.card-rows{display:flex;flex-direction:column;gap:0;margin-bottom:12px;
  border:1px solid var(--border);border-radius:8px;overflow:hidden}
.card-row{display:flex;justify-content:space-between;align-items:center;
  padding:7px 11px;font-size:.78rem;border-bottom:1px solid var(--border)}
.card-row:last-child{border-bottom:none}
.card-row:nth-child(even){background:var(--surface)}
.cr-lbl{color:var(--t3);font-size:.7rem;text-transform:uppercase;letter-spacing:.4px}
.cr-val{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:.78rem;color:var(--t1)}
.cr-val.g{color:var(--green)}
.cr-val.r{color:var(--red)}
.cr-val.y{color:var(--ydark)}

/* TP stack inline */
.tp-inline{display:flex;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:.73rem}
.tp-inline .t1{color:var(--green)}
.tp-inline .t2{color:#059669}
.tp-inline .t3{color:#065f46}

/* Why lines */
.card-why{font-size:.75rem;color:var(--t3);line-height:1.6;
  border-top:1px solid var(--border);padding-top:10px;margin-top:2px}

.card-footer{display:flex;justify-content:space-between;align-items:center;
  margin-top:10px;font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--t4)}

/* ── Empty ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 20px;color:var(--t4);text-align:center;gap:10px;grid-column:1/-1}
.empty-icon{font-size:36px}
.empty-title{font-weight:700;font-size:.95rem;color:var(--t3)}
.empty-sub{font-size:.75rem;line-height:1.7;max-width:340px}

/* ── Drawer ── */
.drawer{position:fixed;right:0;top:0;bottom:0;width:420px;
  background:var(--card);border-left:1px solid var(--border);
  box-shadow:-4px 0 24px rgba(0,0,0,.1);z-index:200;
  transform:translateX(100%);transition:transform .25s ease;
  display:flex;flex-direction:column}
.drawer.open{transform:none}

.drawer-hdr{padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.drawer-title{font-weight:800;font-size:1.05rem;display:flex;align-items:center;gap:8px}
.drawer-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--t3);
  width:32px;height:32px;border-radius:5px;display:flex;align-items:center;justify-content:center}
.drawer-close:hover{background:var(--surface);color:var(--t1)}

/* Drawer Tabs */
.drawer-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.drawer-tabs::-webkit-scrollbar{display:none}
.dtab{padding:9px 16px;font-size:.78rem;font-weight:600;color:var(--t3);cursor:pointer;
  border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.dtab.active{color:var(--ydark);border-bottom-color:var(--yellow)}

/* Drawer body */
.drawer-body{overflow-y:auto;flex:1}
.tab-pane{display:none;padding:0}
.tab-pane.active{display:block}

.d-section{padding:14px 20px;border-bottom:1px solid var(--border)}
.d-label{font-family:'IBM Plex Mono',monospace;font-size:.62rem;font-weight:700;
  color:var(--t4);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
.d-row{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;font-size:.82rem}
.d-row:last-child{margin-bottom:0}
.d-key{color:var(--t3)}
.d-val{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--t1)}
.d-val.g{color:var(--green)}
.d-val.r{color:var(--red)}
.d-val.y{color:var(--ydark)}
.d-val.b{color:var(--blue)}
.d-val.w{color:var(--whale)}

/* Bar in drawer */
.d-bar-wrap{display:flex;align-items:center;gap:8px}
.d-bar-track{width:80px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.d-bar-fill{height:100%;border-radius:3px}

/* Why lines */
.d-why{font-size:.8rem;color:var(--t2);padding:6px 0;
  border-bottom:1px solid var(--border);line-height:1.6}
.d-why:last-child{border:none}

/* TP matrix in drawer */
.tp-matrix-block{display:flex;flex-direction:column;gap:8px}
.tp-row{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:9px 12px}
.tp-row-hdr{font-family:'IBM Plex Mono',monospace;font-size:.65rem;font-weight:700;
  color:var(--blue);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.tp-levels-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:.75rem}
.tpl-lbl{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--t4);margin-bottom:2px}
.tpl-val{font-family:'IBM Plex Mono',monospace;font-weight:700}
.tpl-val.g{color:var(--green)}
.tpl-val.r{color:var(--red)}

/* Score boxes in drawer */
.score-boxes{display:flex;gap:8px;margin-bottom:0}
.sbox{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:10px;text-align:center}
.sbox-lbl{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--t4);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.sbox-val{font-family:'IBM Plex Mono',monospace;font-size:1.2rem;font-weight:800}

/* Drawer links */
.d-links{display:flex;gap:8px;padding:14px 20px}
.d-link{flex:1;text-align:center;padding:8px;border-radius:6px;
  border:1px solid var(--border);color:var(--t2);text-decoration:none;
  font-size:.72rem;font-weight:600;transition:background .15s}
.d-link:hover{background:var(--surface)}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;z-index:999;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px 20px;font-size:.82rem;color:var(--t1);
  box-shadow:0 4px 20px rgba(0,0,0,.12);animation:slideIn .3s ease;max-width:300px;line-height:1.5}

/* ── App shell ── */
.app{display:flex;flex-direction:column;min-height:100vh}

/* ── Mobile ── */
@media(max-width:640px){
  .hdr-stats{display:none}
  .drawer{width:100%}
  .card-grid{grid-template-columns:1fr}
  .fbar{gap:6px;padding:8px 12px}
}
</style>
</head>
<body>
<div class="app">
  <div class="scan"></div>

  <!-- ── Header ── -->
  <div class="hdr">
    <div class="hdr-l">
      <div class="logo">PX</div>
      <div class="logo-t">
        <div class="b">PROPTREX</div>
        <div class="s">Signal Intelligence Platform</div>
      </div>
      <div class="live-badge">
        <div class="live-dot off" id="liveDot"></div>
        <span id="liveLabel">CONNECTING</span>
      </div>
    </div>
    <div class="hdr-stats">
      <div class="hs"><span class="hs-l">Signals</span><span class="hs-v" id="statTotal">0</span></div>
      <div class="hs"><span class="hs-l">Long</span><span class="hs-v" style="color:var(--green)" id="statLong">0</span></div>
      <div class="hs"><span class="hs-l">Short</span><span class="hs-v" style="color:var(--red)" id="statShort">0</span></div>
      <div class="hs"><span class="hs-l">Taranan</span><span class="hs-v" id="statScanned">—</span></div>
      <div class="hs"><span class="hs-l">Son Tarama</span><span class="hs-v" id="statTime">—</span></div>
    </div>
    <div class="hdr-r">
      <a href="/">Admin Panel</a>
    </div>
  </div>

  <!-- ── Filter bar ── -->
  <div class="fbar">
    <span class="fb-label">Yön</span>
    <button class="ftag on" data-f="side" data-v="ALL"   onclick="setFilter('side','ALL',this)">Tümü</button>
    <button class="ftag"    data-f="side" data-v="LONG"  onclick="setFilter('side','LONG',this)">Long</button>
    <button class="ftag"    data-f="side" data-v="SHORT" onclick="setFilter('side','SHORT',this)">Short</button>
    <div class="f-sep"></div>
    <span class="fb-label">Borsa</span>
    <button class="ftag on" data-f="exch" data-v="ALL"     onclick="setFilter('exch','ALL',this)">Tümü</button>
    <button class="ftag"    data-f="exch" data-v="binance" onclick="setFilter('exch','binance',this)">Binance</button>
    <button class="ftag"    data-f="exch" data-v="mexc"    onclick="setFilter('exch','mexc',this)">MEXC</button>
    <button class="ftag"    data-f="exch" data-v="gateio"  onclick="setFilter('exch','gateio',this)">Gate.io</button>
    <button class="ftag"    data-f="exch" data-v="kucoin"  onclick="setFilter('exch','kucoin',this)">KuCoin</button>
    <button class="ftag"    data-f="exch" data-v="okx"     onclick="setFilter('exch','okx',this)">OKX</button>
    <input class="f-search" type="text" placeholder="Sembol ara..." id="searchInput" oninput="renderGrid()">
  </div>

  <!-- ── Momentum strip ── -->
  <div id="mstrip" style="display:none" class="mstrip">
    <span style="font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--whale);font-weight:700;letter-spacing:1px;margin-right:4px">MOMENTUM</span>
    <div id="mstrip-pills"></div>
  </div>

  <!-- ── Card Grid ── -->
  <div class="main">
    <div class="grid-header">
      <div class="grid-title">Bot Sinyalleri</div>
      <div class="grid-count" id="gridCount">0 sinyal</div>
    </div>
    <div class="card-grid" id="cardGrid">
      <div class="empty">
        <div class="empty-icon">📡</div>
        <div class="empty-title">Sinyal bekleniyor</div>
        <div class="empty-sub">Bot tüm borsaları tarıyor. TRADEABLE sinyaller bulunduğunda burada görünecek.</div>
      </div>
    </div>
  </div>
</div>

<!-- ── Signal Drawer ── -->
<div class="drawer" id="drawer">
  <div class="drawer-hdr">
    <div class="drawer-title" id="drawerTitle">—</div>
    <button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>
  </div>
  <div class="drawer-tabs">
    <div class="dtab active" data-tab="signal"       onclick="switchDTab('signal')">Signal</div>
    <div class="dtab"        data-tab="technical"    onclick="switchDTab('technical')">Technical</div>
    <div class="dtab"        data-tab="fundamentals" onclick="switchDTab('fundamentals')">Fundamentals</div>
    <div class="dtab"        data-tab="whale"        onclick="switchDTab('whale')">Whale</div>
    <div class="dtab"        data-tab="news"         onclick="switchDTab('news')">News</div>
  </div>
  <div class="drawer-body">
    <div class="tab-pane active" id="dpane-signal"></div>
    <div class="tab-pane"        id="dpane-technical"></div>
    <div class="tab-pane"        id="dpane-fundamentals"></div>
    <div class="tab-pane"        id="dpane-whale"></div>
    <div class="tab-pane"        id="dpane-news"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
var signals    = new Map();   // "symbol_side" → payload
var spikes     = [];
var filterSide = 'ALL';
var filterExch = 'ALL';
var totalSig   = 0, totalLong = 0, totalShort = 0;
var _openKey   = null;

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function fmt(v) {
  if (v === undefined || v === null) return '\u2014';
  var n = Number(v);
  if (isNaN(n)) return String(v);
  if (n >= 1000) return n.toFixed(2);
  if (n >= 1)    return n.toFixed(4);
  return n.toFixed(6);
}

function scoreColor(v) {
  var n = Number(v);
  if (n >= 70) return 'var(--green)';
  if (n >= 50) return 'var(--ydark)';
  return 'var(--t3)';
}

function drow(key, val, cls) {
  cls = cls || '';
  return '<div class="d-row"><span class="d-key">' + key + '</span>' +
    '<span class="d-val ' + cls + '">' + (val !== undefined && val !== null ? val : '\u2014') + '</span></div>';
}

function dbar(key, val, cls, color) {
  var pct = Math.min(100, Math.max(0, Number(val) || 0));
  return '<div class="d-row"><span class="d-key">' + key + '</span>' +
    '<div class="d-bar-wrap"><span class="d-val ' + cls + '">' + pct.toFixed(1) + '</span>' +
    '<div class="d-bar-track"><div class="d-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div></div></div>';
}

/* ═══════════════════════════════════════════
   WEBSOCKET
═══════════════════════════════════════════ */
function connect() {
  var proto = location.protocol === 'https:' ? 'wss' : 'ws';
  var ws = new WebSocket(proto + '://' + location.host + '/ws/events');

  ws.onopen = function() { setLive(true); };
  ws.onclose = function() { setLive(false); setTimeout(connect, 5000); };
  ws.onerror = function() { setLive(false); };

  ws.onmessage = function(ev) {
    try {
      var msg = JSON.parse(ev.data);
      if (msg.type === 'hello') {
        (msg.recent_signals || []).forEach(function(s) { ingest(s, false); });
        renderGrid();
      } else if (msg.type === 'signal') {
        ingest(msg, true);
        renderGrid();
        showToast(msg);
      } else if (msg.type === 'momentum_spike') {
        spikes.unshift(msg);
        if (spikes.length > 20) spikes.pop();
        renderSpikes();
      } else if (msg.type === 'scan_summary') {
        document.getElementById('statTime').textContent    = msg.time            || '\u2014';
        document.getElementById('statScanned').textContent = msg.scanned          != null ? msg.scanned : '\u2014';
      } else if (msg.type === 'lifecycle_update') {
        var icon = (msg.status || '').indexOf('TP') !== -1 ? '&#x1F3AF;' : '&#x1F6D1;';
        showToastHtml(icon + ' <b>' + msg.symbol + '</b> \u2014 ' + msg.status +
          '<br><span style="color:var(--t3);font-size:.7rem">Fiyat: ' + msg.price + '</span>');
      }
    } catch(e) {}
  };
}

function setLive(on) {
  var dot = document.getElementById('liveDot');
  var lbl = document.getElementById('liveLabel');
  if (on) { dot.classList.remove('off'); lbl.textContent = 'LIVE'; }
  else     { dot.classList.add('off');   lbl.textContent = 'RECONNECTING'; }
}

/* ═══════════════════════════════════════════
   INGEST
═══════════════════════════════════════════ */
function ingest(sig, isNew) {
  var key = sig.symbol + '_' + sig.side;
  var exists = signals.has(key);
  sig._isNew = isNew && !exists;
  sig._key   = key;
  signals.set(key, sig);

  totalSig++;
  if (sig.side === 'LONG') totalLong++; else totalShort++;

  document.getElementById('statTotal').textContent = totalSig;
  document.getElementById('statLong').textContent  = totalLong;
  document.getElementById('statShort').textContent = totalShort;
  if (sig.time) document.getElementById('statTime').textContent = sig.time;
}

/* ═══════════════════════════════════════════
   MOMENTUM STRIP
═══════════════════════════════════════════ */
function renderSpikes() {
  var strip   = document.getElementById('mstrip');
  var pills   = document.getElementById('mstrip-pills');
  if (!spikes.length) { strip.style.display = 'none'; return; }
  strip.style.display = 'flex';
  pills.innerHTML = spikes.slice(0, 12).map(function(s) {
    var pos = s.price_change_pct >= 0;
    return '<span class="mpill">' +
      '<span class="ms">' + s.symbol.replace('/USDT','') + '</span>' +
      '<span class="mc" style="color:' + (pos ? 'var(--green)' : 'var(--red)') + '">' +
        (pos ? '+' : '') + s.price_change_pct + '%</span>' +
      '<span class="mv">' + s.vol_mult + 'x</span></span>';
  }).join('');
}

/* ═══════════════════════════════════════════
   CARD GRID
═══════════════════════════════════════════ */
function renderGrid() {
  var search = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  var rows = [];
  signals.forEach(function(s) { rows.push(s); });

  if (filterSide !== 'ALL') rows = rows.filter(function(s) { return s.side === filterSide; });
  if (filterExch !== 'ALL') rows = rows.filter(function(s) { return s.exchange === filterExch; });
  if (search) rows = rows.filter(function(s) { return s.symbol.toLowerCase().indexOf(search) !== -1; });

  rows.sort(function(a, b) { return (b.ts || 0) - (a.ts || 0); });

  document.getElementById('gridCount').textContent = rows.length + ' sinyal';

  var grid = document.getElementById('cardGrid');
  if (!rows.length) {
    grid.innerHTML = '<div class="empty">' +
      '<div class="empty-icon">&#x1F4E1;</div>' +
      '<div class="empty-title">Sinyal bekleniyor</div>' +
      '<div class="empty-sub">Bot tüm borsaları tarıyor. Sinyaller bulunduğunda burada görünecek.</div>' +
      '</div>';
    return;
  }

  grid.innerHTML = rows.map(buildCard).join('');
}

function buildCard(s) {
  var side    = s.side || 'LONG';
  var sc      = side === 'LONG' ? 'long' : 'short';
  var sym     = (s.symbol || '').replace('/USDT', '');
  var initials = sym.slice(0, 2).toUpperCase();
  var score   = s.opportunity_score != null ? s.opportunity_score : 0;
  var sc_color = scoreColor(score);
  var why     = (s.why_lines || []).slice(0, 2).map(function(w) { return '\u2022 ' + w; }).join('<br>');
  var newCls  = s._isNew ? ' new-card' : '';

  return '<div class="sig-card ' + sc + newCls + '" onclick="openDrawer(\'' + s._key + '\')">' +

    '<div class="card-top">' +
      '<div class="card-sym">' +
        '<div class="sym-icon">' + initials + '</div>' +
        '<div>' +
          '<div class="sym-name">' + s.symbol + '</div>' +
          '<div class="sym-sub">' + (s.timeframe || '\u2014') + ' &middot; #' + (s.signal_number != null ? s.signal_number : '\u2014') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card-badges">' +
        '<span class="badge ' + sc + '">' + side + '</span>' +
        '<span class="badge exch">' + (s.exchange || '').toUpperCase() + '</span>' +
      '</div>' +
    '</div>' +

    '<div class="score-bar">' +
      '<span class="score-num" style="color:' + sc_color + '">' + score + '</span>' +
      '<div class="score-track"><div class="score-fill" style="width:' + Math.min(100, score) + '%;background:' + sc_color + '"></div></div>' +
      '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:.65rem;color:var(--t4)">' + (s.entry_dist_pct != null ? s.entry_dist_pct + '% uzak' : '') + '</span>' +
    '</div>' +

    '<div class="card-rows">' +
      '<div class="card-row">' +
        '<span class="cr-lbl">Giriş Zonu</span>' +
        '<span class="cr-val">' + fmt(s.entry_low) + ' \u2013 ' + fmt(s.entry_high) + '</span>' +
      '</div>' +
      '<div class="card-row">' +
        '<span class="cr-lbl">Stop Loss</span>' +
        '<span class="cr-val r">' + fmt(s.stop_loss) + '</span>' +
      '</div>' +
      '<div class="card-row">' +
        '<span class="cr-lbl">Hedefler</span>' +
        '<div class="tp-inline">' +
          '<span class="t1">TP1 ' + fmt(s.tp1) + '</span>' +
          '<span class="t2">TP2 ' + fmt(s.tp2) + '</span>' +
          '<span class="t3">TP3 ' + fmt(s.tp3) + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="card-row">' +
        '<span class="cr-lbl">Yapı</span>' +
        '<span class="cr-val">' + (s.structure_bias || '\u2014') + '</span>' +
      '</div>' +
    '</div>' +

    (why ? '<div class="card-why">' + why + '</div>' : '') +

    '<div class="card-footer">' +
      '<span>' + (s.time || '') + '</span>' +
      '<span>Why ' + (s.why_enter_score != null ? s.why_enter_score : '\u2014') + ' &middot; Social ' + (s.social_conviction != null ? s.social_conviction : '\u2014') + '</span>' +
    '</div>' +

  '</div>';
}

/* ═══════════════════════════════════════════
   DRAWER
═══════════════════════════════════════════ */
function openDrawer(key) {
  var s = signals.get(key);
  if (!s) return;
  _openKey = key;

  var side   = s.side || 'LONG';
  var sc     = side === 'LONG' ? 'long' : 'short';
  var score  = s.opportunity_score != null ? s.opportunity_score : 0;

  document.getElementById('drawerTitle').innerHTML =
    '<span style="color:var(--yellow)">' + s.symbol + '</span>' +
    '<span class="badge ' + sc + '" style="font-size:.65rem">' + side + '</span>';

  /* ── Signal tab ── */
  var matrix   = s.tp_matrix   || {};
  var tfs      = Object.keys(matrix);
  var matrixHtml = tfs.length
    ? '<div class="tp-matrix-block">' + tfs.map(function(tf) {
        var d = matrix[tf];
        return '<div class="tp-row">' +
          '<div class="tp-row-hdr">' + tf.toUpperCase() + ' Zaman Dilimi</div>' +
          '<div class="tp-levels-row">' +
            '<div><div class="tpl-lbl">TP1</div><div class="tpl-val g">' + fmt(d.tp1) + '</div></div>' +
            '<div><div class="tpl-lbl">TP2</div><div class="tpl-val g">' + fmt(d.tp2) + '</div></div>' +
            '<div><div class="tpl-lbl">TP3</div><div class="tpl-val g">' + fmt(d.tp3) + '</div></div>' +
            (d.stop !== undefined ? '<div><div class="tpl-lbl">Stop</div><div class="tpl-val r">' + fmt(d.stop) + '</div></div>' : '') +
          '</div>' +
          '</div>';
      }).join('') + '</div>'
    : '<span style="color:var(--t4);font-size:.78rem">TP matrisi mevcut değil</span>';

  var whyHtml = (s.why_lines || []).map(function(l) {
    return '<div class="d-why">\u2022 ' + l + '</div>';
  }).join('') || '<div class="d-why" style="color:var(--t4)">Bilgi yok</div>';

  var invHtml = (s.invalidation_lines || []).map(function(l) {
    return '<div class="d-why" style="color:var(--red)">\u2022 ' + l + '</div>';
  }).join('') || '<div class="d-why" style="color:var(--t4)">Koşul yok</div>';

  document.getElementById('dpane-signal').innerHTML =
    '<div class="d-section">' +
      '<div class="score-boxes">' +
        '<div class="sbox"><div class="sbox-lbl">Fırsat</div><div class="sbox-val" style="color:' + scoreColor(score) + '">' + score + '</div></div>' +
        '<div class="sbox"><div class="sbox-lbl">Neden Gir</div><div class="sbox-val" style="color:' + scoreColor(s.why_enter_score) + '">' + (s.why_enter_score != null ? s.why_enter_score : '\u2014') + '</div></div>' +
        '<div class="sbox"><div class="sbox-lbl">Mesafe</div><div class="sbox-val" style="color:var(--ydark)">' + (s.entry_dist_pct != null ? s.entry_dist_pct + '%' : '\u2014') + '</div></div>' +
      '</div>' +
    '</div>' +
    '<div class="d-section">' +
      '<div class="d-label">Seviyeler</div>' +
      drow('Giriş Alt',  fmt(s.entry_low)) +
      drow('Giriş Üst',  fmt(s.entry_high)) +
      drow('Stop Loss',  fmt(s.stop_loss),  'r') +
      drow('TP1 [' + (s.tp1_tf || '\u2014') + ']', fmt(s.tp1), 'g') +
      drow('TP2 [' + (s.tp2_tf || '\u2014') + ']', fmt(s.tp2), 'g') +
      drow('TP3 [' + (s.tp3_tf || '\u2014') + ']', fmt(s.tp3), 'g') +
    '</div>' +
    '<div class="d-section"><div class="d-label">TP Matrisi</div>' + matrixHtml + '</div>' +
    '<div class="d-section"><div class="d-label">Neden Gir?</div>' + whyHtml + '</div>' +
    '<div class="d-section"><div class="d-label">Geçersizleşme</div>' + invHtml + '</div>' +
    '<div class="d-links">' +
      '<a class="d-link" href="https://www.tradingview.com/symbols/' + (s.symbol||'').replace('/','') + '" target="_blank">&#x1F4C8; TradingView</a>' +
      '<a class="d-link" href="https://www.coingecko.com/en/coins/' + (s.symbol||'').split('/')[0].toLowerCase() + '" target="_blank">&#x1F98E; CoinGecko</a>' +
    '</div>';

  /* ── Technical tab ── */
  document.getElementById('dpane-technical').innerHTML =
    '<div class="d-section">' +
      '<div class="d-label">Piyasa Yapısı</div>' +
      drow('Yapı (Structure)', s.structure_bias, 'b') +
      drow('Timeframe', s.timeframe) +
      drow('TP1 Zaman Dilimi', s.tp1_tf) +
      drow('TP2 Zaman Dilimi', s.tp2_tf) +
      drow('TP3 Zaman Dilimi', s.tp3_tf) +
      drow('Momentum Bias', s.momentum_bias, 'y') +
      drow('Giriş Tazeliği', s.entry_freshness) +
      drow('Beklenen Tutma', s.expected_hold) +
    '</div>' +
    '<div class="d-section">' +
      '<div class="d-label">Alım/Satım Akışı</div>' +
      dbar('Alıcı Hakimiyeti', s.buyer_dominance, 'g', 'var(--green)') +
      dbar('Satıcı Baskısı',   s.seller_pressure, 'r', 'var(--red)') +
    '</div>';

  /* ── Fundamentals tab ── */
  document.getElementById('dpane-fundamentals').innerHTML =
    '<div class="d-section">' +
      '<div class="d-label">Sosyal & Orderbook</div>' +
      drow('Sosyal Güven',    s.social_conviction != null ? s.social_conviction + '/100' : null, 'b') +
      drow('X Duygu',         s.x_sentiment) +
      drow('Orderbook Skoru', s.ob_score != null ? s.ob_score + '/100' : null, 'b') +
      drow('OB Dominant',     s.ob_dominant) +
      drow('Birikim Skoru',   s.accumulation_score, 'y') +
      drow('Likidite Olayı',  s.liquidity_event) +
    '</div>';

  /* ── Whale tab ── */
  document.getElementById('dpane-whale').innerHTML =
    '<div class="d-section">' +
      '<div class="d-label">Balina Aktivitesi</div>' +
      dbar('Balina Gücü',    s.whale_strength,  'w', 'var(--whale)') +
      drow('Balina Aksiyonu', s.whale_action,   'w') +
      drow('Balina Çarpanı',  s.whale_mult != null ? s.whale_mult + 'x' : null, 'w') +
      drow('Likidite Olayı',  s.liquidity_event) +
      drow('Birikim Skoru',   s.accumulation_score, 'y') +
    '</div>';

  /* ── News tab ── */
  document.getElementById('dpane-news').innerHTML =
    '<div class="d-section">' +
      '<div class="d-label">Sosyal Veri</div>' +
      drow('X (Twitter) Duygu', s.x_sentiment) +
      drow('Sosyal Güven',      s.social_conviction, 'b') +
    '</div>' +
    '<div class="d-section">' +
      '<div style="font-size:.78rem;color:var(--t3);line-height:1.7">Gerçek zamanlı haber entegrasyonu yakında eklenecek.</div>' +
    '</div>';

  switchDTab('signal');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  _openKey = null;
}

function switchDTab(name) {
  document.querySelectorAll('.dtab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === name);
  });
  document.querySelectorAll('.tab-pane').forEach(function(p) {
    p.classList.toggle('active', p.id === 'dpane-' + name);
  });
}

/* ═══════════════════════════════════════════
   FILTERS
═══════════════════════════════════════════ */
function setFilter(type, val, el) {
  if (type === 'side') filterSide = val;
  else filterExch = val;
  document.querySelectorAll('[data-f="' + type + '"]').forEach(function(b) { b.classList.remove('on'); });
  el.classList.add('on');
  renderGrid();
}

/* ═══════════════════════════════════════════
   TOASTS
═══════════════════════════════════════════ */
function showToast(s) {
  var side  = s.side || 'LONG';
  var color = side === 'LONG' ? 'var(--green)' : 'var(--red)';
  var sym   = (s.symbol || '').replace('/USDT', '');
  showToastHtml(
    '<b style="color:' + color + '">' + sym + ' ' + side + '</b> \u2014 &#x26A1;' + s.opportunity_score +
    '<br><span style="color:var(--t3);font-size:.72rem">Giriş: ' + fmt(s.entry_low) + ' \u2013 ' + fmt(s.entry_high) + '</span>' +
    '<br><span style="color:var(--t4);font-size:.68rem">Detay için tıkla</span>',
    function() { openDrawer(s.symbol + '_' + s.side); }
  );
}

function showToastHtml(html, onclick) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = html;
  if (onclick) { t.style.cursor = 'pointer'; t.onclick = onclick; }
  document.body.appendChild(t);
  setTimeout(function() { if (t.parentNode) t.remove(); }, 7000);
}

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
(function loadInitial() {
  fetch('/api/signals')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      (data.signals || []).forEach(function(s) { ingest(s, false); });
      renderGrid();
    })
    .catch(function() {});
})();

connect();
</script>
